<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science A Syllabus</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="css/textbook-style.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1510;
            color: #f0f0f0;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            font-size: calc(14px + 0.4vw); /* Responsive base font size */
        }
        
        .container {
            width: 90%;
            max-width: 1200px;
            margin: min(1rem, 2vh) auto;
            padding: min(1.5rem, 3vw);
            background-color: transparent;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            justify-content: space-between;
        }
        
        @media (max-width: 1200px) {
            .container {
                width: 95%;
                max-width: 95%;
                padding: 1.5rem;
            }
        }
        
        @media (max-width: 768px) {
            .container {
                width: 95%;
                padding: min(1.5rem, 3vw);
                min-height: 100vh;
                justify-content: space-between;
            }
            
            .tab-button {
                padding: min(0.4rem, 1vw) min(0.6rem, 1.5vw);
                font-size: min(0.7rem, 2vw);
                margin-bottom: 0.1rem;
                margin-right: min(0.1rem, 0.3vw);
            }
            
            .sub-tab-button {
                padding: min(0.4rem, 1vw) min(0.8rem, 1.5vw);
                font-size: min(0.8rem, 2vw);
                margin-bottom: 0.2rem;
            }
            
            h1 {
                font-size: min(2rem, 6vw);
            }
            
            .back-button {
                display: block;
                width: 100%;
                text-align: center;
                margin-top: min(0.5rem, 1vh);
                padding: min(0.4rem, 1vw) min(0.5rem, 1vw);
                font-size: min(0.6rem, 2vw);
            }
            
            .tab-content {
                height: min(250px, 35vh); /* Reduced height for small screens */
                margin-bottom: min(1rem, 2vh);
            }
        }
        
        @media (max-width: 480px) {
            .tab-button, .sub-tab-button {
                flex-basis: calc(50% - 0.5rem);
                max-width: none;
            }
            
            .tab-content {
                height: min(200px, 30vh); /* Further reduced height for very small screens */
            }
            
            .container {
                padding: min(1rem, 2vw);
                margin: min(1rem, 2vh) auto;
            }
            
            .back-button {
                font-size: min(0.4rem, 2vw);
                padding: min(0.4rem, 0.8vw) min(0.4rem, 0.8vw);
            }
        }
        
        h1 {
            text-align: center;
            color: #ffb347;
            margin-bottom: min(1rem, 2vh);
            font-size: min(2.5rem, 8vw);
            text-shadow: 0 0 10px rgba(255, 179, 71, 0.5);
            width: 100%;
            margin-top: min(0.5rem, 1vh);
        }
        
        /* Tab styling */
        .tabs, .back-buttons {
            display: flex;
            flex-wrap: wrap;
            margin-bottom: min(1rem, 2vh);
            border-bottom: 2px solid #ffb347;
            width: 100%;
            justify-content: center;
        }
        
        .back-buttons {
            border-bottom: none;
            margin-top: min(1rem, 2vh);
            margin-bottom: min(1rem, 2vh);
        }
        
        .back-buttons .tab-button {
            background-color: #ffb347;
            color: #1a1510;
            font-weight: bold;
            margin-bottom: min(0.5rem, 1vh);
            flex: 0 1 auto;
            max-width: 25%;
            gap: 0.5rem;
        }
        
        .back-buttons .tab-button:hover {
            background-color: #e6a142;
        }
        
        .tab-button {
            background-color: rgba(60, 40, 20, 0.8);
            border: none;
            color: #f0f0f0;
            padding: min(0.6rem, 1.5vw) min(1rem, 2vw);
            cursor: pointer;
            font-size: min(0.8rem, 2.5vw);
            transition: all 0.3s ease;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            margin-right: min(0.2rem, 0.5vw);
            margin-bottom: min(0.2rem, 0.5vh);
            outline: none;
            flex-grow: 1;
            text-align: center;
            max-width: fit-content;
            white-space: nowrap;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .tab-button:hover {
            background-color: rgba(255, 179, 71, 0.3);
        }
        
        .tab-button.active {
            background-color: #ffb347;
            color: #1a1510;
            font-weight: bold;
        }
        
        /* Tab content styling */
        .tab-content {
            display: none;
            padding: min(1.5rem, 3vw);
            background-color: rgba(50, 40, 30, 0.5);
            border-radius: 0 0 8px 8px;
            animation: fadeIn 0.5s ease;
            height: min(320px, 40vh); /* Reduced from 50vh to 40vh */
            max-height: 60vh; /* Reduced from 80vh to 60vh */
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #4da6ff rgba(30, 30, 60, 0.8);
            margin-bottom: min(1.5rem, 3vh); /* Added margin at bottom */
        }
        
        /* Custom scrollbar styling */
        .tab-content::-webkit-scrollbar {
            width: 8px;
        }
        
        .tab-content::-webkit-scrollbar-track {
            background: rgba(26, 21, 16, 0.5);
            border-radius: 4px;
        }
        
        .tab-content::-webkit-scrollbar-thumb {
            background-color: rgba(255, 179, 71, 0.7);
            border-radius: 4px;
            border: 1px solid rgba(26, 21, 16, 0.8);
        }
        
        .tab-content::-webkit-scrollbar-thumb:hover {
            background-color: rgba(255, 179, 71, 0.9);
        }
        
        /* Firefox scrollbar styling */
        .tab-content {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 179, 71, 0.7) rgba(26, 21, 16, 0.5);
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Typewriter cursor */
        .typewriter-text {
            display: inline-block;
            overflow: hidden;
            white-space: pre-wrap;
            margin: 0;
            letter-spacing: 0.05em;
            position: relative;
            font-size: min(1rem, 3.5vw);
            width: 100%;
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>
    <canvas id="cyber-creature" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;"></canvas>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    
    <div class="container">
        <h1>AP Computer Science A Syllabus</h1>
        
        <div class="tabs">
            <button class="tab-button active" onclick="openTab(event, 'overview')">Course Overview</button>
            <button class="tab-button" onclick="openTab(event, 'classinfo')">Class Info</button>
            <button class="tab-button" onclick="openTab(event, 'objectives')">Course Objectives</button>
            <button class="tab-button" onclick="openTab(event, 'textbook')">Textbook</button>
            <button class="tab-button" onclick="openTab(event, 'grading')">Grading Policy</button>
            <button class="tab-button" onclick="openTab(event, 'exam')">AP Exam Information</button>
            <button class="tab-button" onclick="openTab(event, 'demo')">Demo</button>
        </div>
        
        <div id="overview" class="tab-content">
            <div class="typewriter-text"></div>
        </div>
        
        <div id="classinfo" class="tab-content active">
            <table style="width: 100%; border-collapse: collapse; margin: 1rem 0;">
                <tbody>
                    <tr>
                        <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2); white-space: nowrap; width: 40%;">Teacher:</td>
                        <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">Feng Gao</td>
                    </tr>
                    <tr>
                        <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2); white-space: nowrap;">Grade:</td>
                        <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">11 & 12</td>
                    </tr>
                    <tr>
                        <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2); white-space: nowrap;">Classes per Week:</td>
                        <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">5</td>
                    </tr>
                    <tr>
                        <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2); white-space: nowrap;">Curriculum + Credit:</td>
                        <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">AP 5</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div id="objectives" class="tab-content">
            <div class="typewriter-text"></div>
        </div>
        
        <div id="textbook" class="tab-content">
            <div class="typewriter-text"></div>
            <div class="textbook-image-container" style="width: 100%; display: flex; justify-content: center; margin-top: min(1rem, 2vh);">
                <img src="images/textbook.jpg" alt="Invitation to Computer Science textbook cover" class="textbook-image" style="max-width: min(300px, 80%); height: auto;">
            </div>
        </div>
        
        <div id="grading" class="tab-content">
            <div class="typewriter-text"></div>
        </div>
        
        <div id="expectations" class="tab-content">
            <div class="typewriter-text"></div>
        </div>
        
        <div id="exam" class="tab-content">
            <div class="typewriter-text"></div>
        </div>
        
        <div id="demo" class="tab-content">
            <h2 style="color: #ffb347; text-align: center; margin-bottom: min(1.5rem, 3vh); font-size: min(1.8rem, 6vw); width: 100%;">Demo Videos</h2>
            <div class="video-container" style="display: flex; flex-wrap: wrap; justify-content: space-around; gap: min(20px, 3vw);">
                <div class="video" style="width: 45%; min-width: min(300px, 90vw); background-color: transparent;">
                    <h3 style="color: #ffb347; margin-bottom: min(0.5rem, 1vh); font-size: min(1.2rem, 4vw);">APCSA Primary Data Type: Binary-Feng Gao</h3>
                    <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; border-radius: 8px; box-shadow: 0 0 10px rgba(255, 179, 71, 0.5); background-color: transparent;">
                        <iframe style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" src="https://www.youtube.com/embed/YwTjrEwJl8s" title="APCSA Primary Data Type: Binary-Feng Gao" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                </div>
                <div class="video" style="width: 45%; min-width: min(300px, 90vw); background-color: transparent;">
                    <h3 style="color: #ffb347; margin-bottom: min(0.5rem, 1vh); font-size: min(1.2rem, 4vw);">APCSA Final Project Summary-Feng Gao</h3>
                    <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; border-radius: 8px; box-shadow: 0 0 10px rgba(255, 179, 71, 0.5); background-color: transparent;">
                        <iframe style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" src="https://www.youtube.com/embed/BUFxJvO60iU" title="APCSA Final Project Summary-Feng Gao" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="contact" class="tab-content">
            <div class="typewriter-text"></div>
        </div>
        
            <div class="back-buttons" style="display: flex; flex-wrap: wrap; justify-content: space-around; margin-top: min(1rem, 2vh); width: 100%; position: sticky; bottom: 0; background-color: rgba(26, 21, 16, 0.9); padding: min(0.5rem, 1vh); border-radius: 8px; z-index: 10; box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.3);">
                <button class="tab-button" onclick="window.location.href='../index.html'" style="display: flex; align-items: center;">
                    ← Back to Home
                </button>
                <button class="tab-button" onclick="window.location.href='curriculum.html'" style="display: flex; align-items: center;">
                    Explore Curriculum →
                </button>
            </div>
    </div>
    
    <script src="../js/starfield.js"></script>
    <script src="js/cyber-creature.js"></script>
    <script>
        // Tab functionality
        function openTab(evt, tabName) {
            const tabContents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < tabContents.length; i++) {
                tabContents[i].classList.remove("active");
            }
            
            const tabButtons = document.getElementsByClassName("tab-button");
            for (let i = 0; i < tabButtons.length; i++) {
                tabButtons[i].classList.remove("active");
            }
            
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
            
            // Restart typewriter effect for the selected tab
            startTypewriter(tabName);
        }
        
        // Content for each tab
        const tabContent = {
            overview: `AP Computer Science A is an introductory college-level computer science course that emphasizes object-oriented programming and problem-solving. The course is designed to prepare students for the AP Computer Science A Exam while fostering a deep understanding of programming concepts, algorithms, and data structures. Students will use Java as the primary programming language and will engage in hands-on projects, coding exercises, and algorithmic problem-solving.

This course will also incorporate foundational computer science concepts from the textbook "Invitation to Computer Science" by G. Michael Schneider and Judith L. Gersting, providing a broader context for understanding computational thinking and the principles of computer science.`,
            
            objectives: `By the end of the course, students will be able to:
1. Design, implement, and analyze solutions to problems using object-oriented programming in Java.
2. Understand and apply fundamental programming constructs, including variables, loops, conditionals, and methods.
3. Develop and use algorithms to solve computational problems.
4. Work with data structures such as arrays, ArrayLists, and 2D arrays.
5. Understand and apply principles of inheritance, polymorphism, and abstraction.
6. Analyze and debug programs to ensure correctness and efficiency.
7. Prepare for and succeed on the AP Computer Science A Exam.`,
            classinfo: `
<table style="width: 100%; border-collapse: collapse; margin: 1rem 0;">
  <tbody>
    <tr>
      <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2); width: 40%;">Teacher:</td>
      <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">Feng Gao</td>
    </tr>
    <tr>
      <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">Grade:</td>
      <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">11 & 12</td>
    </tr>
    <tr>
      <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">Classes per Week:</td>
      <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">5</td>
    </tr>
    <tr>
      <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">Curriculum + Credit:</td>
      <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">AP 5</td>
    </tr>
  </tbody>
</table>`,
            
            textbook: `Title: Invitation to Computer Science
Authors: G. Michael Schneider and Judith L. Gersting
Edition: Latest Edition (as available)

This textbook provides an introduction to the theoretical and practical foundations of computer science. While the primary focus of the course is Java programming, selected chapters from the textbook will be used to explore topics such as algorithms, computational theory, and the history of computing.`,
            
            grading: `Grades will be based on the following components:
<table style="width: 100%; border-collapse: collapse; margin: 1rem 0;">
  <thead>
    <tr style="background-color: rgba(255, 179, 71, 0.3);">
      <th style="padding: 0.75rem; text-align: left; border-bottom: 2px solid #ffb347;">Category</th>
      <th style="padding: 0.75rem; text-align: left; border-bottom: 2px solid #ffb347;">Percentage</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">Attendance</td>
      <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">15%</td>
    </tr>
    <tr>
      <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">Participation</td>
      <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">15%</td>
    </tr>
    <tr>
      <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">Homework</td>
      <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">20%</td>
    </tr>
    <tr>
      <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">Exam</td>
      <td style="padding: 0.75rem; border-bottom: 1px solid rgba(255, 179, 71, 0.2);">50%</td>
    </tr>
  </tbody>
</table>
- Late Work Policy: Assignments submitted late will incur a penalty of 10% per day, up to a maximum of 5 days. After 5 days, no credit will be given.
- Extra Credit: Occasionally, extra credit opportunities may be provided, such as solving advanced coding challenges.`,
            
            exam: `Exam Date: Refer to the College Board website for the official AP Computer Science A Exam date.
Exam Format:
  - Section I: Multiple Choice (40 questions, 50% of the score)
  - Section II: Free Response (4 questions, 50% of the score)
    - Topics include methods and control structures, classes, arrays, and algorithms.
Preparation:
  - Weekly practice exams and coding challenges will simulate the AP Exam format.
  - Review sessions will be held in the final 9 weeks of the course.`
        };
        
        // Initialize the first tab and sub-tab
        document.addEventListener('DOMContentLoaded', function() {
            startTypewriter('overview');
        });
        
        // Start typewriter effect for the selected tab
        function startTypewriter(tabId) {
            const content = tabContent[tabId];
            
            // Adjust font size based on window width
            const fontSize = Math.max(0.8, Math.min(1, window.innerWidth / 1200));
            
            // Special handling for different tabs
            if (tabId === 'textbook') {
                // For textbook tab
                const element = document.querySelector(`#${tabId} .typewriter-text`);
                element.style.fontSize = `${fontSize}rem`;
                element.textContent = content;
            } else if (tabId === 'grading') {
                // For grading tab
                const element = document.querySelector(`#${tabId} .typewriter-text`);
                element.style.fontSize = `${fontSize}rem`;
                element.innerHTML = content;
            } else if (tabId !== 'classinfo') {
                // For other tabs except classinfo
                const element = document.querySelector(`#${tabId} .typewriter-text`);
                element.style.fontSize = `${fontSize}rem`;
                element.textContent = content;
            }
            // No action needed for classinfo tab as it contains direct HTML content
        }
        
        // Add window resize event listener to adjust font sizes
        window.addEventListener('resize', function() {
            // Update active tab content font size
            const activeTab = document.querySelector('.tab-content.active');
            if (activeTab) {
                const textElement = activeTab.querySelector('.typewriter-text');
                if (textElement) {
                    const fontSize = Math.max(0.8, Math.min(1, window.innerWidth / 1200));
                    textElement.style.fontSize = `${fontSize}rem`;
                }
            }
        });
    </script>
</body>
</html>
