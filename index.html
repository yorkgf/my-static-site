<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHA AP Courses</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #000000;
            background-image:
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px),
                radial-gradient(rgba(255,255,255,.4), rgba(255,255,255,.1) 2px, transparent 30px);
            background-size: 550px 550px, 350px 350px, 250px 250px, 150px 150px;
            background-position: 0 0, 40px 60px, 130px 270px, 70px 100px;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }

        .slides-container {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100vh;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 2rem;
            text-align: center;
        }

        .slide.active {
            display: flex;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            color: #ffffff;
        }

        h2 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            margin-bottom: 2rem;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        h3 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        p {
            font-size: clamp(1rem, 2.5vw, 1.8rem);
            opacity: 0.8;
        }

        .computer-science-title {
            color: #ffb347;
            text-shadow: 0 0 20px rgba(255, 179, 71, 0.5);
        }

        .physics-link {
            color: #2c5aa0;
            text-shadow: 0 0 10px rgba(44, 90, 160, 0.6);
        }

        /* Terminal styling */
        .code-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .terminal {
            background-color: rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 179, 71, 0.3);
            border: 1px solid rgba(255, 179, 71, 0.3);
        }

        .terminal-header {
            background-color: #333;
            padding: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .terminal-button {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .terminal-button:nth-child(1) { background-color: #ff5f57; }
        .terminal-button:nth-child(2) { background-color: #ffbd2e; }
        .terminal-button:nth-child(3) { background-color: #28ca42; }

        .terminal-title {
            margin-left: 1rem;
            color: #ccc;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .terminal-content {
            padding: 1.5rem;
            font-family: 'Courier New', monospace;
            text-align: left;
        }

        .response {
            margin-bottom: 1rem;
            font-size: clamp(1rem, 2vw, 1.3rem);
        }

        .terminal-link {
            color: #ffb347;
            text-decoration: none;
            font-weight: bold;
        }

        .terminal-link:hover {
            text-decoration: underline;
            text-shadow: 0 0 8px rgba(255, 179, 71, 0.8);
        }

        ul {
            list-style: none;
            font-size: clamp(1.5rem, 3vw, 2rem);
        }

        li {
            margin-bottom: 1.5rem;
        }

        li a {
            color: #ffffff;
            text-decoration: none;
        }

        li a:hover {
            text-decoration: underline;
        }

        .nav-controls {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1rem;
            z-index: 100;
        }

        .nav-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            border: none;
        }

        .nav-dot.active {
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .nav-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 2rem;
            padding: 1rem;
            cursor: pointer;
            border-radius: 4px;
            z-index: 100;
        }

        .nav-arrow:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-arrow.prev {
            left: 2rem;
        }

        .nav-arrow.next {
            right: 2rem;
        }

        .planet-container {
            margin-top: 2rem;
        }

        .planet {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #4da6ff, #1a365d);
            box-shadow: 0 0 30px rgba(77, 166, 255, 0.6);
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .nav-arrow {
                display: none;
            }

            .terminal-content {
                padding: 1rem;
            }

            .slide {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="slides-container">
        <!-- Slide 1: Welcome -->
        <div class="slide active" data-slide="0">
            <h1>Welcome to GHA</h1>
            <h3>Explore our courses</h3>
            <p style="font-style: italic; opacity: 0.8;">Begin your science adventure</p>
        </div>

        <!-- Slide 2: Computer Science -->
        <div class="slide" data-slide="1">
            <h2 class="computer-science-title">Computer Science</h2>
            <div style="height: 5vh;"></div>
            <div class="code-container">
                <div class="terminal">
                    <div class="terminal-header">
                        <span class="terminal-button"></span>
                        <span class="terminal-button"></span>
                        <span class="terminal-button"></span>
                        <span class="terminal-title">root@matrix:~#</span>
                    </div>
                    <div class="terminal-content">
                        <p class="response"><a href="APCSA/syllabus.html" class="terminal-link">AP Computer Science A</a></p>
                        <p class="response"><a href="APCSP/syllabus.html" target="_blank" class="terminal-link">AP Computer Science Principles</a></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Slide 3: Physics -->
        <div class="slide" data-slide="2">
            <h2>Physics</h2>
            <ul>
                <li><a href="APPhysicsC/syllabus.html" target="_blank" class="physics-link">AP Physics C</a></li>
            </ul>
        </div>

        <!-- Slide 4: Future -->
        <div class="slide" data-slide="3">
            <h2>To Continue</h2>
            <p style="font-style: italic; opacity: 0.8; font-size: clamp(1.2rem, 3.5vw, 1.8rem);">This section will be completed in the future...</p>
            <div class="planet-container">
                <div class="planet"></div>
            </div>
        </div>
    </div>

    <!-- Navigation Controls -->
    <button class="nav-arrow prev" onclick="changeSlide(-1)">&#8249;</button>
    <button class="nav-arrow next" onclick="changeSlide(1)">&#8250;</button>

    <div class="nav-controls">
        <button class="nav-dot active" onclick="goToSlide(0)"></button>
        <button class="nav-dot" onclick="goToSlide(1)"></button>
        <button class="nav-dot" onclick="goToSlide(2)"></button>
        <button class="nav-dot" onclick="goToSlide(3)"></button>
    </div>

    <script>
        let currentSlide = 0;
        const totalSlides = document.querySelectorAll('.slide').length;
        const dots = document.querySelectorAll('.nav-dot');

        function showSlide(n) {
            // Hide all slides
            document.querySelectorAll('.slide').forEach(slide => {
                slide.classList.remove('active');
            });

            // Update active dot
            dots.forEach(dot => {
                dot.classList.remove('active');
            });

            // Show current slide
            document.querySelector(`.slide[data-slide="${n}"]`).classList.add('active');
            dots[n].classList.add('active');
            currentSlide = n;
        }

        function changeSlide(direction) {
            let newSlide = currentSlide + direction;
            if (newSlide < 0) newSlide = totalSlides - 1;
            if (newSlide >= totalSlides) newSlide = 0;
            showSlide(newSlide);
        }

        function goToSlide(n) {
            showSlide(n);
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        // Touch swipe support
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            if (touchEndX < touchStartX - 50) changeSlide(1);
            if (touchEndX > touchStartX + 50) changeSlide(-1);
        }
    </script>
</body>
</html>
